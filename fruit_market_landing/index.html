<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORCHARD — Premium Fruit Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080F0A;
      --bg-2:      #0C1810;
      --bg-3:      #101F14;
      --cream:     #F2E8D0;
      --cream-dim: rgba(242,232,208,0.5);
      --orange:    #F97316;
      --yellow:    #EAB308;
      --lime:      #84CC16;
      --red:       #DC2626;
      --purple:    #9333EA;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'Jost', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--orange); }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 28px 56px;
      display: flex; align-items: center; justify-content: space-between;
      transition: padding .4s, background .4s, backdrop-filter .4s;
    }
    .nav.scrolled {
      padding: 18px 56px;
      background: rgba(8,15,10,.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(242,232,208,.06);
    }
    .nav-logo {
      font-family: var(--serif); font-size: 1.5rem; font-weight: 700;
      letter-spacing: .25em; color: var(--cream); text-decoration: none;
    }
    .nav-logo span { color: var(--orange); }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      color: var(--cream-dim); text-decoration: none;
      font-size: .72rem; letter-spacing: .18em; text-transform: uppercase;
      transition: color .3s;
    }
    .nav-links a:hover { color: var(--cream); }
    .nav-cta {
      background: transparent; border: 1px solid var(--orange);
      color: var(--orange); padding: 10px 28px;
      font-family: var(--sans); font-size: .72rem; font-weight: 500;
      letter-spacing: .15em; text-transform: uppercase;
      cursor: pointer; transition: all .3s;
    }
    .nav-cta:hover { background: var(--orange); color: var(--bg); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      position: relative; overflow: hidden; padding: 130px 56px 80px;
    }
    .hero-glow {
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 70% at 72% 50%, rgba(249,115,22,.09) 0%, transparent 55%),
        radial-gradient(ellipse 35% 50% at 15% 80%, rgba(132,204,22,.06) 0%, transparent 50%);
    }
    .hero-grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(242,232,208,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(242,232,208,.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-bgtext {
      position: absolute; bottom: -40px; right: -40px;
      font-family: var(--serif); font-size: 22vw; font-weight: 700;
      color: transparent; -webkit-text-stroke: 1px rgba(242,232,208,.04);
      letter-spacing: -.04em; pointer-events: none; user-select: none; white-space: nowrap;
    }
    .hero-content { position: relative; z-index: 2; max-width: 680px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: .68rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--orange); margin-bottom: 28px;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp .8s ease forwards .3s;
    }
    .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); }
    .hero-title {
      font-family: var(--serif); font-size: clamp(4.5rem, 10vw, 10rem);
      font-weight: 700; line-height: .88; letter-spacing: -.02em;
      color: var(--cream); margin-bottom: 36px;
      opacity: 0; transform: translateY(30px);
      animation: fadeUp 1s ease forwards .5s;
    }
    .hero-title em { font-style: italic; color: var(--orange); display: block; }
    .hero-sub {
      font-size: .95rem; font-weight: 300; color: var(--cream-dim);
      max-width: 400px; margin-bottom: 52px; line-height: 1.75;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp .8s ease forwards .75s;
    }
    .hero-actions {
      display: flex; gap: 20px; align-items: center;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp .8s ease forwards 1s;
    }
    .btn-primary {
      background: var(--orange); color: var(--bg); border: none;
      padding: 15px 40px; font-family: var(--sans); font-size: .75rem;
      font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
      cursor: pointer; transition: opacity .3s, transform .3s;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-ghost {
      background: none; border: none; color: var(--cream-dim);
      font-family: var(--sans); font-size: .75rem; letter-spacing: .1em;
      cursor: pointer; display: flex; align-items: center; gap: 8px; transition: color .3s;
    }
    .btn-ghost:hover { color: var(--cream); }
    .btn-ghost-arr { transition: transform .3s; }
    .btn-ghost:hover .btn-ghost-arr { transform: translateX(5px); }

    /* floating fruits panel */
    .hero-fruits { position: absolute; right: 0; top: 0; bottom: 0; width: 48%; pointer-events: none; }
    .hero-fruit {
      position: absolute; opacity: 0;
      animation: fruitReveal 1s ease forwards, floatA 7s ease-in-out infinite;
    }
    .hero-fruit:nth-child(2) { animation-name: fruitReveal, floatB; }
    .hero-fruit:nth-child(3) { animation-name: fruitReveal, floatA; }
    .hero-fruit:nth-child(4) { animation-name: fruitReveal, floatB; }
    .hero-fruit:nth-child(5) { animation-name: fruitReveal, floatA; }

    .hero-scroll {
      position: absolute; bottom: 40px; left: 56px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; animation: fadeUp .8s ease forwards 1.4s;
    }
    .hero-scroll-label { font-size: .62rem; letter-spacing: .25em; text-transform: uppercase; color: var(--cream-dim); }
    .hero-scroll-line {
      width: 1px; height: 50px;
      background: linear-gradient(to bottom, var(--orange), transparent);
      animation: scrollPulse 1.8s ease-in-out infinite;
    }

    /* ── TICKER ── */
    .ticker {
      border-top: 1px solid rgba(242,232,208,.08);
      border-bottom: 1px solid rgba(242,232,208,.08);
      background: var(--bg-2); padding: 14px 0; overflow: hidden;
    }
    .ticker-track {
      display: flex; white-space: nowrap;
      animation: ticker 30s linear infinite;
    }
    .ticker-item {
      font-family: var(--serif); font-size: 1.05rem; font-style: italic;
      color: var(--cream-dim); padding: 0 36px;
      display: inline-flex; align-items: center; gap: 36px; flex-shrink: 0;
    }
    .ticker-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }

    /* ── FEATURED ── */
    .featured { padding: 120px 56px; }
    .sec-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 72px;
    }
    .sec-eyebrow {
      font-size: .68rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--orange); margin-bottom: 14px;
    }
    .sec-title {
      font-family: var(--serif); font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 700; line-height: .92;
    }
    .sec-title em { font-style: italic; color: var(--orange); }
    .sec-link {
      color: var(--cream-dim); text-decoration: none; font-size: .78rem;
      letter-spacing: .1em; display: flex; align-items: center; gap: 8px;
      transition: color .3s; margin-bottom: 6px;
    }
    .sec-link:hover { color: var(--orange); }

    .card-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }

    .fruit-card {
      background: var(--bg-2); border: 1px solid rgba(242,232,208,.07);
      padding: 48px 32px 36px; position: relative; overflow: hidden;
      transition: transform .45s ease, border-color .45s; cursor: pointer;
    }
    .fruit-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 50%, rgba(249,115,22,.05));
      opacity: 0; transition: opacity .45s;
    }
    .fruit-card:hover { transform: translateY(-10px); border-color: rgba(249,115,22,.25); }
    .fruit-card:hover::after { opacity: 1; }
    .card-num {
      position: absolute; top: 18px; right: 22px;
      font-family: var(--serif); font-size: 5rem; font-weight: 700;
      color: rgba(242,232,208,.04); line-height: 1;
    }
    .card-art { width: 110px; height: 110px; margin: 0 auto 36px; }
    .card-tag {
      display: inline-block; background: rgba(249,115,22,.12); color: var(--orange);
      font-size: .62rem; letter-spacing: .22em; text-transform: uppercase;
      padding: 4px 12px; margin-bottom: 10px;
    }
    .card-name { font-family: var(--serif); font-size: 1.9rem; font-weight: 600; margin-bottom: 4px; }
    .card-origin { font-size: .78rem; color: var(--cream-dim); margin-bottom: 24px; }
    .card-rule { width: 28px; height: 1px; background: var(--orange); margin-bottom: 16px; }
    .card-desc { font-size: .82rem; color: var(--cream-dim); line-height: 1.75; }

    /* ── STORY ── */
    .story {
      padding: 120px 56px; background: var(--bg-2);
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
    }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 52px; }
    .stat-num {
      font-family: var(--serif); font-size: clamp(3.5rem,7vw,5.5rem);
      font-weight: 700; color: var(--orange); line-height: 1; margin-bottom: 10px;
    }
    .stat-lbl { font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: var(--cream-dim); }
    .story-quote {
      font-family: var(--serif); font-size: clamp(1.5rem,2.8vw,2.1rem);
      font-style: italic; font-weight: 300; color: var(--cream); line-height: 1.45;
      margin-bottom: 28px; padding-left: 20px; position: relative;
    }
    .story-quote::before {
      content: '\201C'; position: absolute; left: -16px; top: -24px;
      font-size: 7rem; color: rgba(249,115,22,.14); line-height: 1;
      font-family: var(--serif);
    }
    .story-body { font-size: .88rem; color: var(--cream-dim); line-height: 1.85; margin-bottom: 36px; }

    /* ── SEASONAL ── */
    .seasonal { padding: 120px 56px; }
    .season-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 64px; }
    .season-card {
      background: var(--bg-3); border: 1px solid rgba(242,232,208,.06);
      padding: 40px 24px 28px; text-align: center;
      transition: border-color .3s, transform .3s; cursor: pointer;
    }
    .season-card:hover { border-color: rgba(242,232,208,.18); transform: translateY(-6px); }
    .season-art { width: 72px; height: 72px; margin: 0 auto 20px; }
    .season-name { font-family: var(--serif); font-size: 1.25rem; font-weight: 600; margin-bottom: 6px; }
    .season-period { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--orange); }

    /* ── CTA ── */
    .cta {
      padding: 120px 56px; background: var(--bg-2);
      text-align: center; position: relative; overflow: hidden;
    }
    .cta-radial {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 65% 55% at 50% 50%, rgba(249,115,22,.1) 0%, transparent 65%);
    }
    .cta-title {
      font-family: var(--serif); font-size: clamp(3.5rem,9vw,8rem);
      font-weight: 700; line-height: .88; margin-bottom: 36px; position: relative;
    }
    .cta-title em { font-style: italic; color: var(--orange); display: block; }
    .cta-sub { color: var(--cream-dim); max-width: 380px; margin: 0 auto 52px; font-size: .9rem; position: relative; }
    .cta-btns { display: flex; gap: 16px; justify-content: center; margin-bottom: 80px; position: relative; }
    .btn-outline {
      background: transparent; border: 1px solid rgba(242,232,208,.2); color: var(--cream);
      padding: 15px 40px; font-family: var(--sans); font-size: .75rem;
      font-weight: 500; letter-spacing: .15em; text-transform: uppercase;
      cursor: pointer; transition: border-color .3s, color .3s;
    }
    .btn-outline:hover { border-color: var(--cream); }
    .cta-details { display: flex; justify-content: center; gap: 72px; position: relative; }
    .cta-detail-label { font-size: .65rem; letter-spacing: .25em; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
    .cta-detail-val { font-family: var(--serif); font-size: 1.05rem; }

    /* ── FOOTER ── */
    .footer {
      padding: 44px 56px;
      border-top: 1px solid rgba(242,232,208,.08);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo { font-family: var(--serif); font-size: 1.3rem; font-weight: 700; letter-spacing: .25em; }
    .footer-copy { font-size: .72rem; color: var(--cream-dim); }
    .footer-links { display: flex; gap: 32px; }
    .footer-links a {
      font-size: .72rem; color: var(--cream-dim); text-decoration: none;
      letter-spacing: .1em; transition: color .3s;
    }
    .footer-links a:hover { color: var(--orange); }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fruitReveal {
      0%   { opacity: 0; transform: scale(.7) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes floatA {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      40%       { transform: translateY(-18px) rotate(4deg); }
      70%       { transform: translateY(-9px) rotate(-2deg); }
    }
    @keyframes floatB {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-22px) rotate(-5deg); }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 1; transform: scaleY(1); }
      50%       { opacity: .4; transform: scaleY(.6); }
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ───── CSS FRUIT ILLUSTRATIONS ───── */

const FruitOrange = ({ size = 100 }) => (
  <div style={{ width: size, height: size, position: 'relative' }}>
    <div style={{
      width: '100%', height: '100%', borderRadius: '50%',
      background: 'radial-gradient(circle at 33% 28%, #FDBA74, #F97316 55%, #C2410C)',
      boxShadow: 'inset -8px -10px 22px rgba(0,0,0,.35), 0 18px 36px rgba(249,115,22,.35)',
      position: 'relative', overflow: 'hidden'
    }}>
      <div style={{
        position: 'absolute', top: '12%', left: '18%', width: '28%', height: '22%',
        background: 'rgba(255,255,255,.2)', borderRadius: '50%',
        transform: 'rotate(-25deg)', filter: 'blur(3px)'
      }}/>
    </div>
    <div style={{
      position: 'absolute', top: '-7px', left: '50%', transform: 'translateX(-50%)',
      width: '3px', height: '10px', background: '#713F12', borderRadius: '2px'
    }}/>
    <div style={{
      position: 'absolute', top: '-10px', left: '56%', width: '16px', height: '10px',
      background: '#4D7C0F', borderRadius: '50% 0 50% 0', transform: 'rotate(25deg)'
    }}/>
  </div>
);

const FruitMango = ({ size = 100 }) => (
  <div style={{ width: size * .82, height: size, position: 'relative' }}>
    <div style={{
      width: '100%', height: '100%',
      borderRadius: '38% 62% 52% 48% / 48% 42% 58% 52%',
      background: 'radial-gradient(circle at 33% 28%, #FDE68A, #F59E0B 42%, #B45309)',
      boxShadow: 'inset -6px -8px 20px rgba(0,0,0,.3), 0 16px 30px rgba(245,158,11,.3)',
      position: 'relative', overflow: 'hidden'
    }}>
      <div style={{
        position: 'absolute', top: '8%', left: '12%', width: '24%', height: '18%',
        background: 'rgba(255,255,255,.22)', borderRadius: '50%',
        transform: 'rotate(-18deg)', filter: 'blur(3px)'
      }}/>
      <div style={{
        position: 'absolute', top: '18%', right: '12%', width: '38%', height: '38%',
        background: 'rgba(180,60,0,.28)', borderRadius: '50%', filter: 'blur(10px)'
      }}/>
    </div>
    <div style={{
      position: 'absolute', top: '-6px', left: '53%', width: '3px', height: '10px',
      background: '#713F12'
    }}/>
  </div>
);

const FruitStrawberry = ({ size = 100 }) => (
  <div style={{ width: size * .78, height: size, position: 'relative' }}>
    <div style={{
      width: '100%', height: '88%', marginTop: '12%',
      background: 'radial-gradient(circle at 33% 28%, #FCA5A5, #E63946 50%, #991B1B)',
      borderRadius: '50% 50% 46% 46%', position: 'relative', overflow: 'hidden',
      boxShadow: 'inset -6px -8px 18px rgba(0,0,0,.3), 0 16px 30px rgba(230,57,70,.3)'
    }}>
      {[[24,22],[44,14],[64,22],[34,44],[56,40],[24,58],[50,58],[68,50],[38,74],[58,74]].map(([x,y],i) => (
        <div key={i} style={{
          position: 'absolute', left: `${x}%`, top: `${y}%`,
          width: '5px', height: '5px', background: '#FDE68A', borderRadius: '50%'
        }}/>
      ))}
      <div style={{
        position: 'absolute', top: '8%', left: '18%', width: '20%', height: '15%',
        background: 'rgba(255,255,255,.22)', borderRadius: '50%',
        transform: 'rotate(-18deg)', filter: 'blur(2px)'
      }}/>
    </div>
    {[[-12, -5, '-30deg'], [2, -8, '0deg'], [16, -5, '30deg']].map(([x,y,rot], i) => (
      <div key={i} style={{
        position: 'absolute', top: '8%', left: `${50 + x}%`,
        width: '20px', height: '12px', background: '#166534',
        borderRadius: '50% 0 50% 0',
        transform: `translate(-50%,-50%) rotate(${rot})`,
        transformOrigin: 'bottom center'
      }}/>
    ))}
  </div>
);

const FruitGrapes = ({ size = 100 }) => {
  const positions = [
    [50,2],[34,19],[66,19],[18,37],[50,37],[82,37],[34,55],[66,55],[50,73]
  ];
  const r = size * .13;
  return (
    <div style={{ width: size, height: size, position: 'relative' }}>
      <div style={{
        position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)',
        width: '2px', height: '11%', background: '#713F12'
      }}/>
      {positions.map(([cx,cy], i) => (
        <div key={i} style={{
          position: 'absolute',
          left: `${cx}%`, top: `${cy + 8}%`,
          width: r*2, height: r*2,
          transform: 'translateX(-50%)',
          borderRadius: '50%',
          background: 'radial-gradient(circle at 33% 28%, #DDD6FE, #9333EA 50%, #581C87)',
          boxShadow: 'inset -3px -4px 10px rgba(0,0,0,.4)'
        }}>
          <div style={{
            position: 'absolute', top: '14%', left: '18%', width: '28%', height: '24%',
            background: 'rgba(255,255,255,.3)', borderRadius: '50%', filter: 'blur(1px)'
          }}/>
        </div>
      ))}
    </div>
  );
};

const FruitLemon = ({ size = 100 }) => (
  <div style={{ width: size * 1.3, height: size * .78, position: 'relative' }}>
    <div style={{
      width: '100%', height: '100%',
      borderRadius: '50% 50% 50% 50% / 38% 38% 62% 62%',
      background: 'radial-gradient(circle at 33% 28%, #FEF08A, #EAB308 55%, #A16207)',
      boxShadow: 'inset -6px -8px 20px rgba(0,0,0,.25), 0 14px 28px rgba(234,179,8,.3)',
      position: 'relative', overflow: 'hidden'
    }}>
      <div style={{
        position: 'absolute', left: '-4px', top: '50%', transform: 'translateY(-50%)',
        width: '10px', height: '13px', background: '#EAB308', borderRadius: '50%'
      }}/>
      <div style={{
        position: 'absolute', right: '-4px', top: '50%', transform: 'translateY(-50%)',
        width: '10px', height: '13px', background: '#EAB308', borderRadius: '50%'
      }}/>
      <div style={{
        position: 'absolute', top: '10%', left: '16%', width: '22%', height: '20%',
        background: 'rgba(255,255,255,.24)', borderRadius: '50%',
        transform: 'rotate(-18deg)', filter: 'blur(3px)'
      }}/>
    </div>
  </div>
);

const FruitWatermelonSlice = ({ size = 64 }) => (
  <div style={{ width: size, height: size * .6, position: 'relative' }}>
    <div style={{
      width: size, height: size * .6,
      borderRadius: `${size * .6}px ${size * .6}px 0 0`,
      background: 'linear-gradient(to bottom, #15803D, #4ADE80)',
      position: 'absolute', bottom: 0, overflow: 'hidden'
    }}>
      {[12,30,50,70,88].map(p => (
        <div key={p} style={{
          position: 'absolute', top: 0, bottom: 0, left: `${p}%`, width: '3%',
          background: 'rgba(255,255,255,.1)'
        }}/>

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav className={`nav${scrolled ? ' scrolled' : ''}`}>
      <a href="#" className="nav-logo">ORCH<span>A</span>RD</a>
      <ul className="nav-links">
        {['Market','Seasonal','Our Story','Contact'].map(l => <li key={l}><a href="#">{l}</a></li>)}
      </ul>
      <button className="nav-cta">Shop Now</button>
    </nav>
  );
}

    <section className="hero">

          <em>Finest</em><br/>

      </div>

          { top:'14%', right:'28%', delay:'.9s',  dur:'7s',  Component: FruitOrange,     size:148 },

          { top:'66%', right:'32%', delay:'1.5s', dur:'9s',  Component: FruitStrawberry, size:100 },
          { top:'22%', right:'58%', delay:'.7s',  dur:'6.5s',Component: FruitLemon,      size:88  },
          { top:'76%', right:'58%', delay:'1.8s', dur:'7.5s',Component: FruitGrapes,     size:96  }

          <div key={i} className="hero-fruit" style={{

      </div>

      <div className="hero-scroll">
        <span className="hero-scroll-label">Scroll</span>
        <div className="hero-scroll-line"/>
      </div>
    </section>
  );
}
